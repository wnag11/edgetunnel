name: Upstream Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream without workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://github.com/cmliu/edgetunnel.git /tmp/upstream

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows' \
            /tmp/upstream/ ./

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync upstream without workflows"
            git push
          fi
